name: Update total stars

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute total stars
        id: stars
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          total_stars=$(gh api users/zimingttkx/repos --paginate --jq '[.[] | .stargazers_count] | add // 0')
          echo "total_stars=$total_stars" >> "$GITHUB_OUTPUT"

      - name: Update README badge
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os, re

          readme = Path('README.md')
          total_stars = os.environ['TOTAL_STARS']
          text = readme.read_text(encoding='utf-8')
          pattern = r'https://img\.shields\.io/badge/Total%20Stars-\d+-blue\?style=flat-square'
          new = f'https://img.shields.io/badge/Total%20Stars-{total_stars}-blue?style=flat-square'
          if not re.search(pattern, text):
              raise SystemExit('Could not find total stars badge in README.md')
          readme.write_text(re.sub(pattern, new, text), encoding='utf-8')
          PY
        env:
          TOTAL_STARS: ${{ steps.stars.outputs.total_stars }}

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update total stars badge"
          git push